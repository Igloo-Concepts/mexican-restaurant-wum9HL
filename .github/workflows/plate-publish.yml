name: Plate Publish Runner

on:
  workflow_dispatch:
    inputs:
      plate_action:
        description: "build or submission"
        required: true
        type: string
      plate_project_id:
        description: "Plate project id"
        required: true
        type: string
      plate_run_id:
        description: "Plate run id"
        required: true
        type: string
      plate_payload_json:
        description: "Raw payload from runner"
        required: true
        type: string

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout app repo
        uses: actions/checkout@v4

      - name: Resolve Expo token
        shell: bash
        env:
          PAYLOAD_EXPO_TOKEN: ${{ fromJson(inputs.plate_payload_json).expoToken }}
          SECRET_EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: |
          set -euo pipefail
          token="${PAYLOAD_EXPO_TOKEN:-}"
          if [ -z "$token" ]; then
            token="${SECRET_EXPO_TOKEN:-}"
          fi
          if [ -z "$token" ]; then
            echo "Missing Expo token. Provide expoToken in runner payload or set EXPO_TOKEN repo secret."
            exit 1
          fi
          echo "::add-mask::$token"
          echo "EXPO_TOKEN=$token" >> "$GITHUB_ENV"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup Expo/EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ env.EXPO_TOKEN }}

      # AI generation can change package.json arbitrarily between turns, so any
      # checked-in package-lock.json drifts and breaks `npm ci` on the EAS
      # build worker. Strip every lockfile (committed or runtime-generated) and
      # commit the deletion locally so eas-cli's git-archive upload ships a
      # lockfile-free project. EAS then falls back to `npm install`, which is
      # permissive about new dependencies.
      - name: Drop stale lockfiles for EAS upload
        shell: bash
        run: |
          set -euo pipefail
          rm -f package-lock.json npm-shrinkwrap.json yarn.lock pnpm-lock.yaml
          git config user.email "ci@plate.local"
          git config user.name "plate-ci"
          git add -A
          if ! git diff --cached --quiet; then
            git commit -m "chore(ci): drop lockfiles before EAS upload" --no-verify
          fi

      - name: Build (iOS)
        if: ${{ inputs.plate_action == 'build' }}
        run: |
          npx eas-cli build --platform ios --non-interactive --no-wait --json

      - name: Submit (iOS)
        if: ${{ inputs.plate_action == 'submission' }}
        run: |
          npx eas-cli submit --platform ios --non-interactive --latest --json
