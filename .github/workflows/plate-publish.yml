name: Plate Publish Runner

on:
  workflow_dispatch:
    inputs:
      plate_action:
        description: "build or submission"
        required: true
        type: string
      plate_project_id:
        description: "Plate project id"
        required: true
        type: string
      plate_run_id:
        description: "Plate run id"
        required: true
        type: string
      plate_payload_json:
        description: "Raw payload from runner"
        required: true
        type: string
